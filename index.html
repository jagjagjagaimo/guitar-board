<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Guitar Board">
  <link rel="manifest" href="manifest.json">
  <title>Guitar Fretboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a; color: #eee;
      font-family: system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px 6px; font-size: 13px; color: #888;
    }
    #fb-info {
      text-align: center; font-size: 15px; font-weight: 500;
      color: #aaa; padding: 6px 0 8px; min-height: 32px;
    }
    #fb-wrap {
      overflow: scroll;
      -webkit-overflow-scrolling: touch;
      padding: 0 8px 24px;
    }
    #fb-grid {
      display: grid;
      grid-template-columns: repeat(23, 48px);
      gap: 3px;
      min-width: max-content;
    }
    .nc {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0; cursor: pointer;
      font-size: 11px; font-weight: 500;
      background: #2a2a2a; border: 0.5px solid #444; color: #ccc;
      user-select: none;
      touch-action: none;
    }
    .nc.c-note { background: #cc0000; color: #fff; border-color: #990000; }
    .nc.lit { background: #ff9900 !important; color: #fff !important; border-color: #cc7700 !important; }
    .nc.lit-main {
      background: #ff6600 !important; color: #fff !important;
      border-color: #cc4400 !important;
      outline: 2px solid #ff6600; outline-offset: 1px;
    }
  </style>
</head>
<body>
  <div id="header">
    <span>14 strings · 23 frets</span>
    <span>タップで演奏</span>
  </div>
  <div id="fb-info">— 音符をタップ —</div>
  <div id="fb-wrap">
    <div id="fb-grid"></div>
  </div>

  <script>
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const OPEN_MIDI = [86,81,76,71,66,61,56,51,46,41,36,31,26,21];
    const NUM_FRETS = 23;
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }
    function midiToName(m) { return NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1); }

    function playPluck(freq) {
      const ctx = getAudio();
      const now = ctx.currentTime;
      const dur = Math.min(2.8, 0.5 + 2.3 * Math.pow(freq / 500, -0.4));
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.001, now);
      master.gain.linearRampToValueAtTime(0.6, now + 0.01);
      master.gain.exponentialRampToValueAtTime(0.001, now + dur);
      master.connect(ctx.destination);
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(freq * 5, now);
      filter.frequency.exponentialRampToValueAtTime(freq * 1.5, now + dur * 0.5);
      filter.connect(master);
      [['triangle', 0.5], ['sawtooth', 0.2], ['sine', 0.15]].forEach(([type, vol]) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.value = vol;
        osc.connect(g);
        g.connect(filter);
        osc.start(now);
        osc.stop(now + dur + 0.05);
      });
    }

    const grid = document.getElementById('fb-grid');
    const info = document.getElementById('fb-info');
    const cellsByName = {};

    OPEN_MIDI.forEach(openMidi => {
      for (let fret = 0; fret < NUM_FRETS; fret++) {
        const midi = openMidi + fret;
        const name = midiToName(midi);
        const cell = document.createElement('div');
        cell.className = 'nc' + ((midi % 12 === 0) ? ' c-note' : '');
        cell.textContent = name;
        cell.dataset.midi = midi;
        cell.dataset.name = name;
        if (!cellsByName[name]) cellsByName[name] = [];
        cellsByName[name].push(cell);
        grid.appendChild(cell);
      }
    });

    const touchLit = {};

    function highlightOn(touchId, cell) {
      const name = cell.dataset.name;
      const cells = cellsByName[name] || [];
      touchLit[touchId] = cells;
      cells.forEach(c => c.classList.add('lit'));
      cell.classList.remove('lit');
      cell.classList.add('lit-main');
      info.textContent = '♪  ' + name + '  (' + Math.round(midiToFreq(parseInt(cell.dataset.midi))) + ' Hz)';
    }

    function highlightOff(touchId) {
      if (!touchLit[touchId]) return;
      touchLit[touchId].forEach(c => c.classList.remove('lit', 'lit-main'));
      delete touchLit[touchId];
    }

    grid.addEventListener('touchstart', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.classList.contains('nc')) {
          e.preventDefault();
          highlightOn(touch.identifier, el);
          playPluck(midiToFreq(parseInt(el.dataset.midi)));
        }
      });
    }, { passive: false });

    grid.addEventListener('touchend', e => {
      Array.from(e.changedTouches).forEach(touch => highlightOff(touch.identifier));
    }, { passive: false });

    grid.addEventListener('touchcancel', e => {
      Array.from(e.changedTouches).forEach(touch => highlightOff(touch.identifier));
    }, { passive: false });

    grid.addEventListener('click', e => {
      const cell = e.target.closest('.nc');
      if (!cell) return;
      highlightOn('click', cell);
      playPluck(midiToFreq(parseInt(cell.dataset.midi)));
      setTimeout(() => highlightOff('click'), 600);
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
